<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AYA Travel · Register</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #07132b;
      color: #eef2ff;
      padding: 24px;
    }
    .register {
      width: 100%;
      max-width: 440px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 18px 44px rgba(0,0,0,0.28);
    }
    h1 {
      margin: 0;
      font-size: 25px;
    }
    p {
      margin: 8px 0 22px;
      color: #a5b4fc;
      font-size: 13px;
      line-height: 1.5;
    }
    label {
      display: block;
      margin: 12px 0 6px;
      color: #cbd5e1;
      font-size: 12px;
    }
    input {
      width: 100%;
      border: 1px solid #334155;
      background: #111827;
      color: #fff;
      padding: 12px;
      border-radius: 10px;
      outline: none;
      font-size: 14px;
    }
    button {
      width: 100%;
      margin-top: 18px;
      border: 0;
      border-radius: 10px;
      padding: 13px 16px;
      background: #16a34a;
      color: white;
      font-weight: 800;
      cursor: pointer;
    }
    .switch {
      margin-top: 16px;
      text-align: center;
      color: #cbd5e1;
      font-size: 13px;
    }
    .switch a {
      color: #93c5fd;
      font-weight: 800;
      text-decoration: none;
    }
    .error {
      display: none;
      margin-top: 14px;
      color: #fecaca;
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(248,113,113,0.35);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <form class="register" id="registerForm">
    <h1>Създай акаунт</h1>
    <p>Регистрация за AYA Travel Offer Engine. След регистрация ще влезеш директно в dashboard-а.</p>

    <label>Име</label>
    <input id="name" name="name" autocomplete="name" required />

    <label>Email</label>
    <input id="email" name="email" type="email" autocomplete="email" required />

    <label>Password</label>
    <input id="password" name="password" type="password" autocomplete="new-password" minlength="6" required />

    <button type="submit">Create account</button>
    <div class="switch">Вече имаш акаунт? <a href="/login">Login</a></div>
    <div class="error" id="errorBox"></div>
  </form>

  <script>
    const form = document.getElementById("registerForm");
    const errorBox = document.getElementById("errorBox");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      errorBox.style.display = "none";

      const payload = {
        name: document.getElementById("name").value.trim(),
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value
      };

      try {
        const res = await fetch("/api/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "Registration failed");
        window.location.href = "/admin";
      } catch (error) {
        errorBox.textContent = error.message;
        errorBox.style.display = "block";
      }
    });
  </script>
</body>
</html>
